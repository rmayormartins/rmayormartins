name: Atualizar estatísticas GitHub

on:
  schedule:
    - cron: "0 6 * * *"   # Diariamente as 06:00 UTC (03:00 BRT)
  workflow_dispatch:        # Permite rodar manualmente em Actions > Run workflow
  push:
    branches: [main]
    paths:
      - generate_stats.py
      - .github/workflows/update_stats.yml

permissions:
  contents: write          # necessario para o commit/push do README

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Rodar script de estatisticas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_stats.py

      - name: Commit e push (se houver mudancas)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          if git diff --staged --quiet; then
            echo "Sem mudancas para commitar."
          else
            git commit -m "chore(stats): atualiza My Stats Action [skip ci]"
            git push
          fi
